server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location = /env-config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* ^/(dashboard|projects|tasks|chat|attendance|edit-time|team|monitoring|approval-inbox|reports|invoices|payroll|user-management|employees|audit-logs|add-user|users/add-user|notifications|settings|legacy|desktop-web-dashboard|desktop-web-payroll|login|forgot-password|reset-password|verify-email|accept-invite|signup)(/|$) {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
