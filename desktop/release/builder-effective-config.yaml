directories:
  output: release
  buildResources: build
appId: com.carevance.tracker
productName: CareVance Tracker
icon: assets/icon.ico
files:
  - filter:
      - main.cjs
      - preload.cjs
      - app-config.json
      - scripts/**/*
      - assets/**/*
      - package.json
publish:
  - provider: github
    owner: Igrisssssss
    repo: carevance_hrms
    releaseType: release
asar: true
npmRebuild: false
win:
  target:
    - nsis
  icon: assets/icon.ico
  artifactName: ${productName}-Setup-${version}-${arch}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: CareVance Tracker
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico
electronVersion: 33.4.11
