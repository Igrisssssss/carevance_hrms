services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - carevance

  backend:
    build:
      context: ../../backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 10000
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:10000"
    volumes:
      - backend_storage:/var/www/html/storage
    networks:
      - carevance

  queue:
    build:
      context: ../../backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    command: ["sh", "-lc", "php artisan queue:work --tries=1 --timeout=0"]
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - backend_storage:/var/www/html/storage
    networks:
      - carevance

  frontend:
    build:
      context: ../../frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_WEB_APP_URL: ${VITE_WEB_APP_URL}
      VITE_DESKTOP_DOWNLOAD_URL: ${VITE_DESKTOP_DOWNLOAD_URL}
      VITE_DESKTOP_DOWNLOAD_LABEL: ${VITE_DESKTOP_DOWNLOAD_LABEL}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - carevance

volumes:
  postgres_data:
  backend_storage:

networks:
  carevance:
    driver: bridge
